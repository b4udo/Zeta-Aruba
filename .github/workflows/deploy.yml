name: zeta-aruba-deploy

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: zeta-aruba-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: Build and test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: corretto
          java-version: '21'
          cache: maven

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: ai-engine/requirements.txt

      - name: Install AI engine dependencies
        run: pip install -r ai-engine/requirements.txt

      - name: Build Java modules
        run: mvn -B clean install

      - name: Validate AI engine syntax
        working-directory: ai-engine
        run: python -m compileall src tests

      - name: Run AI engine unit tests
        working-directory: ai-engine
        run: pytest tests -q

  publish-images:
    name: Publish Docker images
    runs-on: ubuntu-latest
    needs: build-test
    if: github.event_name != 'pull_request'

    strategy:
      fail-fast: false
      matrix:
        include:
          - image: zeta-aruba-gateway
            context: ./gateway
          - image: zeta-aruba-user-service
            context: ./user-service
          - image: zeta-aruba-pec-service
            context: ./pec-service
          - image: zeta-aruba-ai-engine
            context: ./ai-engine

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}
          tags: |
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=main,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  publish-demo-bundle:
    name: Publish demo bundle artifact
    runs-on: ubuntu-latest
    needs: build-test
    if: github.event_name != 'pull_request'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Upload demo bundle
        uses: actions/upload-artifact@v4
        with:
          name: zeta-aruba-demo-bundle
          path: |
            docker-compose.yml
            README.md
            docs/**
            config/**
            gateway/Dockerfile
            user-service/Dockerfile
            pec-service/Dockerfile
            ai-engine/Dockerfile
          if-no-files-found: error
